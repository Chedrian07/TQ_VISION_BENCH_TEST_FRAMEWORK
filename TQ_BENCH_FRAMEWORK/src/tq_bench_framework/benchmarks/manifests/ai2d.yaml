id: ai2d
title: AI2D
stage: core
description: Diagram understanding benchmark for structural visual reasoning.
data_file_env: AI2D_DATASET_FILE
adapter: unified_jsonl_vqa
metric: normalized_exact_match
default_sampling_profile: controlled
best_effort_sampling_profile: best_effort_general
max_output_tokens: 48
prompt_template: "{question}"
system_prompt: "Answer the diagram question directly and briefly."
notes: "Primary structure/diagram benchmark."
