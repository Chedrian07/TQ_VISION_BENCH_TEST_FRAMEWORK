id: mathvista
title: MathVista
stage: diagnostic
description: Visual math reasoning benchmark used for secondary diagnosis.
data_file_env: MATHVISTA_DATASET_FILE
adapter: unified_jsonl_vqa
metric: mathvista_match
default_sampling_profile: controlled
best_effort_sampling_profile: best_effort_reasoning
max_output_tokens: 32
prompt_template: "{question}"
system_prompt: "Return only the final answer. For multiple-choice questions, return only the option letter. For numeric questions, return only the final number with the requested precision and no explanation."
notes: "Reasoning-oriented secondary benchmark."
