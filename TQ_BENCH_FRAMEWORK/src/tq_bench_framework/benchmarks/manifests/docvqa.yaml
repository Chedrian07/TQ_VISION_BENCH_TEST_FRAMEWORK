id: docvqa
title: DocVQA
stage: core
description: Document VQA benchmark for dense text and layout-sensitive inputs.
data_file_env: DOCVQA_DATASET_FILE
adapter: unified_jsonl_vqa
metric: anls
default_sampling_profile: controlled
best_effort_sampling_profile: best_effort_general
max_output_tokens: 48
prompt_template: "{question}"
system_prompt: "Answer the document question using a concise exact string."
notes: "Primary document/OCR benchmark."
