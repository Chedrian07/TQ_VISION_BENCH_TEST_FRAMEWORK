id: ocrbench_v2
title: OCRBench v2
stage: diagnostic
description: OCR-focused diagnosis benchmark for error mode separation.
data_file_env: OCRBENCH_V2_DATASET_FILE
adapter: unified_jsonl_vqa
metric: ocrbench_exact
default_sampling_profile: controlled
best_effort_sampling_profile: best_effort_general
max_output_tokens: 48
prompt_template: "{question}"
system_prompt: "Read the image carefully and return the shortest exact answer."
notes: "Run when OCR-specific degradation is suspected."
